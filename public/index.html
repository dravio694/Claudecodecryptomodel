<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LASTCLICK — Claudecodetrading</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.3.9/lib/index.iife.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0c18, #03050b);
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      max-width: 550px;
      width: 100%;
      background: rgba(6, 12, 24, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 255, 200, 0.3);
      border-radius: 2rem;
      padding: 1.8rem;
      box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,255,200,0.1) inset;
    }
    .price { font-size: 3.8rem; font-weight: bold; text-align: center; color: #0ff; text-shadow: 0 0 15px #0ff; letter-spacing: 4px; }
    .timer { font-size: 2.8rem; text-align: center; background: #00000066; padding: 0.5rem; border-radius: 2rem; margin: 1rem 0; letter-spacing: 8px; font-family: monospace; }
    .timer.urgent { color: #ff4444; text-shadow: 0 0 10px #ff4444; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 2rem; font-size: 1.1rem;
      font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase;
    }
    .btn-primary { background: linear-gradient(95deg, #00ccaa, #008877); color: #000; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 1px solid #0ff; color: #0ff; margin-bottom: 1rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; margin: 1rem 0; }
    .stat { background: #00000055; border-radius: 1rem; padding: 0.5rem; text-align: center; }
    .history { margin-top: 1.5rem; background: #00000044; border-radius: 1rem; padding: 1rem; }
    .history span { background: #0ff2; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; margin: 4px; display: inline-block; }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #0ff; color: #000; padding: 10px 20px; border-radius: 40px;
      font-weight: bold; animation: fadeOut 3s forwards;
    }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    .status { margin-top: 1rem; background: #0a0f1e; padding: 0.6rem; border-radius: 2rem; text-align: center; font-size: 0.7rem; }
  </style>
</head>
<body>
<div class="card">
  <div style="text-align:center; margin-bottom:1rem;"><span style="letter-spacing:6px;">◈ SOLANA USDC ◈</span></div>
  <button id="connectBtn" class="btn btn-ghost">🔌 CONNECTER WALLET</button>
  <div class="price" id="price">--.-- USDC</div>
  <div class="timer" id="timer">--:--:--</div>
  <div class="grid">
    <div class="stat"><div>ACHETEURS</div><div id="buyerCount" style="font-size:1.6rem; color:#0ff;">0</div></div>
    <div class="stat"><div>LEADER</div><div id="lastBuyer">—</div></div>
    <div class="stat"><div>EN LIGNE</div><div id="onlineCount">1</div></div>
  </div>
  <button id="buyBtn" class="btn btn-primary" disabled>⚡ ACHETER</button>
  <div class="history"><div>📜 DERNIERS ACHETEURS</div><div id="historyList">—</div></div>
  <div class="status" id="statusMsg">🔄 Connexion au serveur...</div>
</div>

<script>
  const socket = io();
  let state = { price: 0, endTime: 0, buyerCount: 0, lastBuyer: '—', history: [], isActive: true };
  let walletConnected = false, publicKey = null, buyLoading = false, currentQuoteId = null;

  // DOM
  const priceEl = document.getElementById('price');
  const timerEl = document.getElementById('timer');
  const buyerCountEl = document.getElementById('buyerCount');
  const lastBuyerEl = document.getElementById('lastBuyer');
  const onlineCountEl = document.getElementById('onlineCount');
  const historyListEl = document.getElementById('historyList');
  const buyBtn = document.getElementById('buyBtn');
  const connectBtn = document.getElementById('connectBtn');
  const statusMsg = document.getElementById('statusMsg');

  function setStatus(msg, isOk = true) { statusMsg.innerHTML = msg; statusMsg.style.color = isOk ? '#0ff' : '#ff6666'; }
  function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

  let timerInterval = null;
  function startTimer(endTime) {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      const diff = endTime - Date.now();
      if (diff <= 0) { timerEl.innerText = '00:00:00'; return; }
      const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
      timerEl.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      if (h === 0 && m < 15) timerEl.classList.add('urgent'); else timerEl.classList.remove('urgent');
    }, 1000);
  }

  function updateUI(data) {
    if (data.price) { state.price = data.price; priceEl.innerText = state.price.toFixed(2) + ' USDC'; }
    if (data.endTime) startTimer(data.endTime);
    if (data.buyerCount !== undefined) { state.buyerCount = data.buyerCount; buyerCountEl.innerText = state.buyerCount; }
    if (data.lastBuyer) { state.lastBuyer = data.lastBuyer; lastBuyerEl.innerText = state.lastBuyer; }
    if (data.history) { state.history = data.history; historyListEl.innerHTML = state.history.map(h => `<span>${h}</span>`).join('') || '—'; }
    if (data.isActive !== undefined) { state.isActive = data.isActive; buyBtn.disabled = !(walletConnected && state.isActive && !buyLoading); }
  }

  socket.on('init', updateUI);
  socket.on('priceUpdate', updateUI);
  socket.on('auctionEnded', (data) => { setStatus(`🏆 ENCHÈRE TERMINÉE — Gagnant : ${data.winner} — ${data.finalPrice} USDC`); buyBtn.disabled = true; });
  socket.on('newPurchase', (data) => toast(`🔥 ${data.buyer} a acheté à ${data.price} USDC !`));
  socket.on('statsUpdate', (data) => { onlineCountEl.innerText = data.online; });

  connectBtn.onclick = async () => {
    if (!window.solana?.isPhantom) return toast("Installez Phantom Wallet");
    try {
      const resp = await window.solana.connect();
      publicKey = resp.publicKey.toString();
      walletConnected = true;
      setStatus(`✅ Connecté : ${publicKey.slice(0,4)}...${publicKey.slice(-4)}`);
      connectBtn.disabled = true;
      connectBtn.innerText = '✅ CONNECTÉ';
      if (state.isActive) buyBtn.disabled = false;
    } catch(e) { toast("Connexion refusée"); }
  };

  async function executeBuy() {
    buyLoading = true; buyBtn.disabled = true;
    setStatus("⏳ Préparation quote...");
    try {
      const quoteRes = await fetch('/api/quote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ buyerAddress: publicKey })
      });
      const quote = await quoteRes.json();
      if (!quote.success) throw new Error(quote.error);
      currentQuoteId = quote.quoteId;
      const amount = quote.amountUSDC;
      setStatus(`💰 Envoi de ${amount} USDC...`);

      const connection = new solanaWeb3.Connection('https://api.mainnet-beta.solana.com');
      const fromPubkey = new solanaWeb3.PublicKey(publicKey);
      const toPubkey = new solanaWeb3.PublicKey(quote.platformWallet);
      const mintPubkey = new solanaWeb3.PublicKey(quote.usdcMint);
      const fromTokenAccount = await splToken.getAssociatedTokenAddress(mintPubkey, fromPubkey);
      const toTokenAccount = await splToken.getAssociatedTokenAddress(mintPubkey, toPubkey);
      const amountRaw = Math.round(amount * Math.pow(10, quote.decimals));
      const tx = new solanaWeb3.Transaction().add(
        splToken.createTransferInstruction(fromTokenAccount, toTokenAccount, fromPubkey, amountRaw, [], splToken.TOKEN_PROGRAM_ID)
      );
      tx.feePayer = fromPubkey;
      tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
      const signed = await window.solana.signTransaction(tx);
      const signature = await connection.sendRawTransaction(signed.serialize());
      await connection.confirmTransaction(signature);

      setStatus("⏳ Vérification paiement...");
      const verifyRes = await fetch('/api/verify-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ buyerAddress: publicKey, signature, quoteId: currentQuoteId })
      });
      const result = await verifyRes.json();
      if (result.success) {
        setStatus(`✅ Achat validé ! Nouveau prix : ${result.newPrice} USDC`);
        toast(`💸 Achat confirmé à ${amount} USDC !`);
      } else throw new Error(result.error);
    } catch (err) {
      setStatus(`❌ Erreur : ${err.message}`, false);
      toast("Transaction échouée");
    }
    buyLoading = false;
    if (state.isActive && walletConnected) buyBtn.disabled = false;
  }

  buyBtn.onclick = () => {
    if (!walletConnected || !state.isActive || buyLoading) return;
    if (confirm(`Acheter à ${state.price.toFixed(2)} USDC ? Le prix va augmenter de 20%, timer redémarre à 24h.`))
      executeBuy();
  };
</script>
</body>
</html>
